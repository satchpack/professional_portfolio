<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satchel Schiavo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body onload="initPage()">
    <div class="max-w-6xl mx-auto px-8 py-12 relative min-h-screen flex flex-col justify-between">
        <div>
            <div class="absolute top-12 right-8 z-50">
                <button id="menu-btn" onclick="toggleMenu()" class="font-bold uppercase tracking-widest text-sm flex items-center gap-2">Menu ▾</button>
                <div id="dropdown" class="hidden absolute right-0 mt-2 bg-white border border-gray-200 shadow-xl py-2 w-40 text-right text-black z-50">
                    <span onclick="handleNav('home')" class="block px-4 py-2 nav-item text-sm uppercase" id="nav-home">Home</span>
                    <span onclick="handleNav('about')" class="block px-4 py-2 nav-item text-sm uppercase" id="nav-about">About</span>
                    <span onclick="handleNav('experience')" class="block px-4 py-2 nav-item text-sm uppercase" id="nav-experience">Experience</span>
                  
                    <span onclick="handleNav('resume')" class="block px-4 py-2 nav-item text-sm uppercase" id="nav-resume">Resume</span>
                    
                </div>
            </div>
            <header class="mb-16"><h1 onclick="navigateTo('home')" class="text-2xl font-bold cursor-pointer">Satchel Schiavo</h1></header>
            <main id="app-content"></main>
        </div>
        <footer class="mt-24 pt-8 border-t border-gray-100 text-xs text-gray-400">
            <div class="flex justify-between items-center mb-4">
                <span>© Satchel Schiavo Portfolio</span>
                <button onclick="toggleDiagnostics()" class="underline hover:text-black transition">Toggle Local Asset Diagnostics</button>
            </div>
            <div id="diagnostics-panel" class="hidden border border-dashed border-gray-300 p-6 bg-gray-50 text-gray-600 rounded">
                <h4 class="font-black uppercase tracking-wider text-black mb-3">Local Asset Diagnostics Console</h4>
                <div id="diagnostics-log" class="space-y-2 font-mono text-[11px]"></div>
            </div>
        </footer>
    </div>
    <script src="js/projects.js"></script>
    <script src="js/about.js"></script>
    <script src="js/experience.js"></script>
    <script src="js/resume.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
